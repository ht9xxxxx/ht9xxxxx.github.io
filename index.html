<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>たけおの部屋</title>
  <!-- CSS -->
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h2>たけおの部屋</h2>
    <nav>
      <a href="#">Home</a>
      <a href="あばうと/">About</a>
    </nav>
  </header>

  <main>
    <section class="intro">
      <h2>Welcome!</h2>
      <p>ノリで作ったサイトです</p>
    </section>
  <section class="sns-profile">
  <h2>SNSリンク</h2>
  <div class="social-links">
    <a href="https://www.youtube.com/@takeooo-o" target="_blank" class="btn btn-youtube">YouTube</a>
    <a href="https://x.com/" target="_blank" class="btn btn-twitter">X</a>
    <a href="https://www.instagram.com/" target="_blank" class="btn btn-instagram">Instagram</a>
  </div>
</section>
<style>
  .social-links {
    display: flex;
    justify-content: center;
    gap: 15px; 
    margin-top: 20px;
    flex-wrap: wrap; 
  }
  .btn {
    padding: 10px 20px;
    color: white;
    font-weight: bold;
    text-decoration: none;
    border-radius: 8px;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .btn:hover {
    transform: translateY(-3px);
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
  }
  .btn-youtube {
    background-color: #FF0000;
  }
  .btn-twitter {
    background-color: #000000;
  }
  .btn-instagram {
    background: radial-gradient(circle at 30% 107%, #fdf497 0%, #fdf497 5%, #fd5949 45%, #d6249f 60%, #285AEB 90%);
  }
  /* モバイル対応 */
  @media (max-width: 600px) {
    .btn {
      padding: 8px 16px;
      font-size: 0.9rem;
    }
  }
</style>
</section>
  </main>
</body>
</html>
